<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗМЕЙКА</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: #000000;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #sg-root {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
  }

  .sg-title {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    font-weight: 900;
    color: #00ff88;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sg-sub {
    font-size: 11px;
    color: #00ff88;
    letter-spacing: 4px;
    margin-bottom: 36px;
  }

  .sg-btn {
    display: block;
    width: 240px;
    padding: 13px 0;
    margin: 8px auto;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    border: 2px solid #00ff88;
    background: transparent;
    color: #00ff88;
    cursor: pointer;
    transition: none;
  }

  .sg-btn:hover { background: #00ff88; color: #0808ff; }
  .sg-btn:active { background: #00cc66; border-color: #00cc66; color: #0a0a0f; }

  .sg-btn.danger { border-color: #ff3355; color: #ff3355; }
  .sg-btn.danger:hover { background: #ff3355; color: #0a0a0f; }

  .sg-btn.dim { border-color: #444; color: #444; }
  .sg-btn.dim:hover { background: #444; color: #0a0a0f; }

  .sg-btn.small {
    width: 180px;
    font-size: 10px;
    padding: 9px 0;
  }

  #sg-canvas {
    display: block;
    border: 2px solid #1a1a2e;
    background: #050508;
  }

  .sg-hud {
    display: flex;
    justify-content: space-between;
    width: 400px;
    margin-bottom: 8px;
    font-size: 12px;
    color: #444;
    letter-spacing: 2px;
  }

  .sg-hud span { color: #00ff88; }
  .sg-hud .hud-diff { color: #ffcc00; font-size: 11px; }

  .sg-screen { display: none; flex-direction: column; align-items: center; }
  .sg-screen.active { display: flex; }

  .sg-label {
    font-size: 11px;
    color: #444;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .sg-diff-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .sg-diff-btn {
    padding: 11px 22px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    border: 2px solid #222;
    background: transparent;
    color: #444;
    cursor: pointer;
    text-transform: uppercase;
  }

  .sg-diff-btn.selected { border-color: #ffcc00; color: #ffcc00; }
  .sg-diff-btn:hover:not(.selected) { border-color: #555; color: #555; }

  .sg-diff-desc {
    font-size: 11px;
    color: #444;
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .sg-records-list {
    width: 360px;
    border: 1px solid #1a1a2e;
    margin-bottom: 20px;
  }

  .sg-rec-header {
    display: flex;
    justify-content: space-between;
    padding: 6px 16px;
    background: #111;
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
    border-bottom: 1px solid #1a1a2e;
  }

  .sg-rec-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 16px;
    border-bottom: 1px solid #0d0d12;
    font-size: 13px;
  }

  .sg-rec-row:last-child { border-bottom: none; }
  .sg-rec-row .rank { color: #333; width: 24px; font-size: 11px; }
  .sg-rec-row .name { color: #888; flex: 1; padding: 0 10px; }
  .sg-rec-row .rdiff { font-size: 10px; color: #333; margin-right: 10px; }
  .sg-rec-row .rscore { color: #00ff88; font-weight: 700; }
  .sg-rec-row .rdate { font-size: 10px; color: #222; margin-left: 10px; }
  .sg-rec-row.top1 .rscore { color: #ffcc00; }
  .sg-rec-row.top1 .rank { color: #ffcc00; }
  .sg-rec-row.top1 .name { color: #aaa; }

  .sg-empty-records {
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: #222;
    letter-spacing: 3px;
  }

  .sg-gameover-label {
    font-size: 11px;
    color: #444;
    letter-spacing: 4px;
    margin-top: 8px;
  }

  .sg-gameover-score {
    font-family: 'Orbitron', monospace;
    font-size: 56px;
    font-weight: 900;
    color: #00ff88;
    margin: 6px 0 12px;
    line-height: 1;
  }

  .sg-new-record {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    color: #ffcc00;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .sg-input {
    background: #0a0a0f;
    border: 2px solid #00ff88;
    color: #00ff88;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    padding: 10px 20px;
    text-align: center;
    width: 240px;
    outline: none;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .sg-input::placeholder { color: #222; }
  .sg-input:focus { border-color: #00ffaa; }

  .sg-hint {
    font-size: 10px;
    color: #222;
    letter-spacing: 2px;
    margin-top: 5px;
  }

  .sg-hint.bright { color: #333; }

  .sg-section-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #00ff88;
    letter-spacing: 5px;
    margin-bottom: 6px;
  }

  .sg-go-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    font-size: 11px;
    color: #00ff2a;
    letter-spacing: 2px;
  }

  .sg-go-stats span { color: #f30000; }
</style>
</head>
<body>
<div id="sg-root">

  <div id="sc-menu" class="sg-screen active">
    <div class="sg-title">SIXSEVEN</div>
    <button class="sg-btn" onclick="showScreen('sc-game-init')">▶ &nbsp; ИГРАТЬ</button>
    <button class="sg-btn dim" onclick="showScreen('sc-records')">◈ &nbsp; РЕКОРДЫ</button>
    <button class="sg-btn dim" onclick="showScreen('sc-difficulty')">◎ &nbsp; СЛОЖНОСТЬ</button>
  </div>

  <div id="sc-difficulty" class="sg-screen">
    <div class="sg-section-title">СЛОЖНОСТЬ</div>
    <div class="sg-label">Выбирай давай</div>
    <div class="sg-diff-row">
      <button class="sg-diff-btn" id="diff-easy"   onclick="setDiff('easy')">ЛОХ</button>
      <button class="sg-diff-btn selected" id="diff-medium" onclick="setDiff('medium')">НОРМИС</button>
      <button class="sg-diff-btn" id="diff-hard"   onclick="setDiff('hard')">SIXSEVEEEEEN</button>
    </div>
    <div id="diff-desc" class="sg-diff-desc">скорость: средняя · стены: нет</div>
    <button class="sg-btn" onclick="showScreen('sc-menu')">← &nbsp; НАЗАД</button>
  </div>

  <div id="sc-records" class="sg-screen">
    <div class="sg-section-title">РЕКОРДЫ</div>
    <div class="sg-label">топ 67 игроков</div>
    <div class="sg-records-list" id="records-list"></div>
    <button class="sg-btn danger small" onclick="clearRecords()">✕ &nbsp; ОЧИСТИТЬ ВСЁ</button>
    <button class="sg-btn dim" style="margin-top:10px" onclick="showScreen('sc-menu')">← &nbsp; НАЗАД</button>
  </div>

  
  <div id="sc-game-init" class="sg-screen">
    <div class="sg-section-title">ИГРОК</div>
    <div class="sg-label">кто ты,воин</div>
    <input class="sg-input" id="player-name" maxlength="10" placeholder="ИМЯ" autocomplete="off" />
    <button class="sg-btn" onclick="startGame()">▶ &nbsp; НАЧАТЬ</button>
    <button class="sg-btn dim" onclick="showScreen('sc-menu')">← &nbsp; НАЗАД</button>
  </div>

  <div id="sc-game" class="sg-screen">
    <div class="sg-hud">
      <div>СЧЁТ:&nbsp;<span id="hud-score">0</span></div>
      <div class="hud-diff" id="hud-diff">СРЕДНЕ</div>
      <div>РЕКОРД:&nbsp;<span id="hud-best">0</span></div>
    </div>
    <canvas id="sg-canvas" width="400" height="400"></canvas>
    <div class="sg-hint bright">ПРОБЕЛ — пауза</div>
    <div class="sg-hint">↑ ↓ ← → или W A S D — управление</div>
    <button class="sg-btn danger small" style="margin-top:14px" onclick="exitToMenu()">✕ &nbsp; ВЫЙТИ</button>
  </div>

  <div id="sc-gameover" class="sg-screen">
    <div class="sg-section-title">БЕСПАЛЫЙ ЧТОЛИ?</div>
    <div class="sg-gameover-label">ПОЗОРНЫЙ СЧЕТ</div>
    <div class="sg-gameover-score" id="go-score">0</div>
    <div class="sg-new-record" id="go-newrecord" style="display:none">★ &nbsp; ЛЕГЕНДА,НОВЫЙ РЕКОРД</div>
    <div class="sg-go-stats">
      <div>ДЛИНА: <span id="go-length">0</span></div>
      <div>СЛОЖНОСТЬ: <span id="go-diff">—</span></div>
    </div>
    <button class="sg-btn" onclick="restartGame()">↺ &nbsp; ЕЩЕ РАЗ</button>
    <button class="sg-btn dim" onclick="showScreen('sc-menu')">← &nbsp; МЕНЮ</button>
  </div>

</div>

<script>
  
  const CELL = 20, COLS = 20, ROWS = 20;

  const DIFF_CONFIG = {
    easy:   { speed: 180, walls: false, label: 'ЛЕГКО',  desc: 'скорость: медленная · стены: нет' },
    medium: { speed: 120, walls: false, label: 'СРЕДНЕ', desc: 'скорость: средняя · стены: нет'  },
    hard:   { speed:  65, walls: true,  label: 'СЛОЖНО', desc: 'скорость: высокая · стены: смерть' }
  };

  
  let currentDiff = 'medium';
  let playerName  = 'ИГРОК';
  let score       = 0;
  let bestScore   = 0;
  let snake       = [];
  let dir         = { x: 1, y: 0 };
  let nextDir     = { x: 1, y: 0 };
  let food        = { x: 0, y: 0 };
  let gameLoop    = null;
  let paused      = false;
  let running     = false;

  
  function showScreen(id) {
    document.querySelectorAll('.sg-screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'sc-records') renderRecords();
  }

 
  function setDiff(d) {
    currentDiff = d;
    document.querySelectorAll('.sg-diff-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('diff-' + d).classList.add('selected');
    document.getElementById('diff-desc').textContent = DIFF_CONFIG[d].desc;
  }

  const DB_KEY = 'snake_records_v1';

  function dbGet() {
    try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); }
    catch { return []; }
  }

  function dbSave(records) {
    try { localStorage.setItem(DB_KEY, JSON.stringify(records)); }
    catch (e) { console.warn('localStorage недоступен:', e); }
  }

  function dbAddRecord(name, sc, difficulty) {
    const records = dbGet();
    const entry = {
      name:  name.toUpperCase().trim() || 'ИГРОК',
      score: sc,
      diff:  difficulty,
      date:  new Date().toLocaleDateString('ru-RU')
    };
    records.push(entry);
    records.sort((a, b) => b.score - a.score);
    const top = records.slice(0, 10);
    dbSave(top);
    // Проверяем, является ли это записью новым рекордом #1
    return top[0].score === sc && top[0].name === entry.name;
  }

  function dbGetBest() {
    const r = dbGet();
    return r.length ? r[0].score : 0;
  }

  
  function renderRecords() {
    const records = dbGet();
    const el = document.getElementById('records-list');

    if (!records.length) {
      el.innerHTML = `<div class="sg-empty-records">НЕТ ЗАПИСЕЙ</div>`;
      return;
    }

    const header = `<div class="sg-rec-header">
      <span style="width:24px">#</span>
      <span style="flex:1;padding:0 10px">ИМЯ</span>
      <span>СЛОЖН</span>
      <span style="margin-left:16px">СЧЁТ</span>
      <span style="margin-left:10px;width:50px;text-align:right">ДАТА</span>
    </div>`;

    const rows = records.map((r, i) => `
      <div class="sg-rec-row${i === 0 ? ' top1' : ''}">
        <span class="rank">${i + 1}.</span>
        <span class="name">${r.name}</span>
        <span class="rdiff">${r.diff}</span>
        <span class="rscore">${r.score}</span>
        <span class="rdate">${r.date || ''}</span>
      </div>`).join('');

    el.innerHTML = header + rows;
  }

  function clearRecords() {
    if (confirm('Удалить все рекорды?')) {
      dbSave([]);
      renderRecords();
    }
  }

  
  function startGame() {
    playerName = document.getElementById('player-name').value.trim() || 'ИГРОК';
    bestScore  = dbGetBest();
    document.getElementById('hud-best').textContent = bestScore;
    document.getElementById('hud-diff').textContent  = DIFF_CONFIG[currentDiff].label;
    showScreen('sc-game');
    initGame();
  }

  function restartGame() {
    showScreen('sc-game');
    initGame();
  }

  function exitToMenu() {
    clearInterval(gameLoop);
    running = false;
    showScreen('sc-menu');
  }

  function initGame() {
    clearInterval(gameLoop);
    score   = 0;
    paused  = false;
    running = true;

    document.getElementById('hud-score').textContent = '0';

    snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };

    placeFood();
    draw();
    gameLoop = setInterval(tick, DIFF_CONFIG[currentDiff].speed);
  }

  
  function placeFood() {
    let f;
    do {
      f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === f.x && s.y === f.y));
    food = f;
  }

  function tick() {
    if (paused || !running) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (DIFF_CONFIG[currentDiff].walls) {
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
    } else {
      head.x = (head.x + COLS) % COLS;
      head.y = (head.y + ROWS) % ROWS;
    }

    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      document.getElementById('hud-score').textContent = score;
      if (score > bestScore) {
        bestScore = score;
        document.getElementById('hud-best').textContent = bestScore;
      }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame() {
    clearInterval(gameLoop);
    running = false;

    const isNewRecord = dbAddRecord(playerName, score, DIFF_CONFIG[currentDiff].label);

    document.getElementById('go-score').textContent  = score;
    document.getElementById('go-length').textContent = snake.length;
    document.getElementById('go-diff').textContent   = DIFF_CONFIG[currentDiff].label;
    document.getElementById('go-newrecord').style.display = (isNewRecord && score > 0) ? 'block' : 'none';

    showScreen('sc-gameover');
  }

  
  const cvs = document.getElementById('sg-canvas');
  const ctx  = cvs.getContext('2d');

  function draw() {
    
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, 400, 400);

    
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if ((x + y) % 2 === 0) {
          ctx.fillStyle = '#07070c';
          ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        }
      }
    }

    
    ctx.fillStyle = '#ff3355';
    ctx.fillRect(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6);
    ctx.strokeStyle = '#ff6677';
    ctx.lineWidth = 1;
    ctx.strokeRect(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6);

    
    ctx.strokeStyle = '#ff1144';
    ctx.lineWidth = 1;
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    ctx.beginPath();
    ctx.moveTo(fx - 3, fy); ctx.lineTo(fx + 3, fy);
    ctx.moveTo(fx, fy - 3); ctx.lineTo(fx, fy + 3);
    ctx.stroke();

    
    snake.forEach((s, i) => {
      const t = i / snake.length;
      if (i === 0) {
        
        ctx.fillStyle = '#00ff88';
      } else {
        
        const g = Math.floor(200 * (1 - t * 0.65));
        const b = Math.floor(80  * (1 - t));
        ctx.fillStyle = `rgb(0, ${g}, ${b})`;
      }
      ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);

      // Обводка головы
      if (i === 0) {
        ctx.strokeStyle = '#00ffaa';
        ctx.lineWidth = 1;
        ctx.strokeRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);

        // Глаза
        const eyeOff = 4;
        ctx.fillStyle = '#0a0a0f';
        if (dir.x === 1) {
          ctx.fillRect(s.x * CELL + 14, s.y * CELL + eyeOff,     3, 3);
          ctx.fillRect(s.x * CELL + 14, s.y * CELL + CELL - eyeOff - 3, 3, 3);
        } else if (dir.x === -1) {
          ctx.fillRect(s.x * CELL + 3,  s.y * CELL + eyeOff,     3, 3);
          ctx.fillRect(s.x * CELL + 3,  s.y * CELL + CELL - eyeOff - 3, 3, 3);
        } else if (dir.y === -1) {
          ctx.fillRect(s.x * CELL + eyeOff,             s.y * CELL + 3,  3, 3);
          ctx.fillRect(s.x * CELL + CELL - eyeOff - 3,  s.y * CELL + 3,  3, 3);
        } else {
          ctx.fillRect(s.x * CELL + eyeOff,             s.y * CELL + 14, 3, 3);
          ctx.fillRect(s.x * CELL + CELL - eyeOff - 3,  s.y * CELL + 14, 3, 3);
        }
      }
    });

    if (paused) {
      ctx.fillStyle = 'rgba(5, 5, 8, 0.78)';
      ctx.fillRect(0, 0, 400, 400);
      ctx.fillStyle = '#00ff88';
      ctx.font = '700 18px "Orbitron", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ПАУЗА', 200, 192);
      ctx.font = '11px "Share Tech Mono", monospace';
      ctx.fillStyle = '#444';
      ctx.fillText('нажмите ПРОБЕЛ для продолжения', 200, 216);
      ctx.textAlign = 'left';
    }
  }

 
  const KEY_MAP = {
    ArrowUp:    { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, KeyS: { x: 0, y:  1 },
    ArrowLeft:  { x:-1, y:  0 }, KeyA: { x:-1, y:  0 },
    ArrowRight: { x: 1, y:  0 }, KeyD: { x: 1, y:  0 }
  };

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      if (running) { e.preventDefault(); paused = !paused; if (!paused) draw(); }
      return;
    }
    const nd = KEY_MAP[e.code];
    if (nd && running) {
      e.preventDefault();
      // Нельзя развернуться на 180°
      if (!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
    }
  });

  // Enter в поле имени запускает игру
  document.getElementById('player-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') startGame();
  });

  setDiff('medium');
</script>
</body>
</html>
